<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escalade Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">

<header class="bg-emerald-700 text-white p-4">
  <h1 class="text-2xl font-bold">Escalade Coach</h1>
  <p class="text-sm">Utiliser plus les pieds que les bras</p>
</header>

<main class="p-4 space-y-6 max-w-3xl mx-auto">

<!-- Infos -->
<section class="bg-white p-4 rounded-xl shadow">
  <h2 class="font-bold mb-3">Préparation</h2>

  <input id="climber" placeholder="Nom du grimpeur"
    class="w-full border p-2 rounded mb-2">

  <input id="observer" placeholder="Nom de l'observateur"
    class="w-full border p-2 rounded mb-2">

  <select id="voie" class="w-full border p-2 rounded">
    <option value="">Choisir une voie</option>
    <option>4a</option>
    <option>4b</option>
    <option>4c</option>
    <option>5a</option>
    <option>5b</option>
    <option>5c</option>
  </select>

  <div class="mt-3 space-y-2">
    <button onclick="autorisation()" class="bg-indigo-500 text-white w-full py-2 rounded">
      Autorisation
    </button>

    <button onclick="start()" class="bg-green-600 text-white w-full py-2 rounded">
      Départ autorisé
    </button>
  </div>

  <div id="status" class="mt-3 text-orange-600 font-bold">
    En attente
  </div>
</section>

<!-- Compteur -->
<section id="zone" class="bg-white p-4 rounded-xl shadow opacity-50 pointer-events-none">

  <h2 class="font-bold mb-3">Compteur</h2>

  <div class="grid grid-cols-2 gap-4">

    <button onclick="bras()" class="bg-orange-500 text-white p-4 rounded">
      <div id="b">0</div>
      Bras
    </button>

    <button onclick="pieds()" class="bg-green-500 text-white p-4 rounded">
      <div id="p">0</div>
      Pieds
    </button>

  </div>

  <button onclick="analyse()" class="mt-3 bg-black text-white w-full py-2 rounded">
    Analyser
  </button>

  <button onclick="reset()" class="mt-2 bg-red-300 w-full py-2 rounded">
    Reset
  </button>

</section>

<!-- Résultat -->
<section class="bg-white p-4 rounded-xl shadow">
  <h2 class="font-bold mb-3">Résultat</h2>
  <div id="result">...</div>
</section>

</main>

<script>
let b = 0;
let p = 0;
let ok = false;

function bras(){
  if(!ok) return;
  b++;
  document.getElementById("b").innerText = b;
}

function pieds(){
  if(!ok) return;
  p++;
  document.getElementById("p").innerText = p;
}

function autorisation(){
  let c = climber.value;
  let o = observer.value;
  let v = voie.value;

  if(!c || !o || !v){
    status.innerText = "Remplir toutes les infos";
    return;
  }

  status.innerText = "Attendre le prof...";
}

function start(){
  ok = true;
  zone.classList.remove("opacity-50","pointer-events-none");
  status.innerText = "GO !";
}

function analyse(){
  let msg = "";

  if(p > b){
    msg = "💪 Très bien ! Tu utilises bien tes jambes ! Tu peux passer à une voie plus dure !";
  }
  else if(p == b){
    msg = "👍 Pas mal ! mais tu peux faire mieux... recommence !";
  }
  else{
    msg = "😅 Aïe aïe aïe... ça tire dans les bras ! utilise plus tes jambes !";
  }

  result.innerHTML = `
    Bras : ${b}<br>
    Pieds : ${p}<br><br>
    ${msg}
  `;
}

function reset(){
  b = 0;
  p = 0;
  ok = false;
  document.getElementById("b").innerText = 0;
  document.getElementById("p").innerText = 0;
  result.innerText = "...";
  status.innerText = "En attente";
  zone.classList.add("opacity-50","pointer-events-none");
}
</script>

</body>
</html>
